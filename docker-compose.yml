version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: upiguard-postgres
    environment:
      POSTGRES_DB: upiguard
      POSTGRES_USER: upiguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upiguard123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upiguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - upiguard-network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: upiguard-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - upiguard-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upiguard-backend
    environment:
      - DATABASE_URL=postgresql://upiguard:${POSTGRES_PASSWORD:-upiguard123}@postgres:5432/upiguard
      - REDIS_URL=redis://redis:6379
      - ADMIN_EMAILS=admin@upiguard.com,security@upiguard.com
      - CORS_ORIGINS=${FRONTEND_URL:-http://localhost}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - upiguard-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: upiguard-frontend
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:8000/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - upiguard-network

  # Nginx Load Balancer (for production scaling)
  nginx-lb:
    image: nginx:alpine
    container_name: upiguard-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - upiguard-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  upiguard-network:
    driver: bridge
