services:
  - type: web
    name: upi-guard-api
    env: python
    plan: free
    buildCommand: ""
    startCommand: "python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upi-guard-db
          property: connectionString
      - key: ADMIN_EMAILS
        sync: false
      - key: CORS_ORIGINS
        value: "https://your-vercel-app.vercel.app"
        sync: false

databases:
  - name: upi-guard-db
    plan: free
